version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vantage
      POSTGRES_PASSWORD: vantage_pw
      POSTGRES_DB: vantage_dev
    ports:
      - "5432:5432"
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
